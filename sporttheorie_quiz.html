<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sporttheorie Abi Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --surface: #17191d;
  --surface2: #1f2228;
  --border: #2a2d35;
  --text: #f0f0ee;
  --muted: #6b6f7a;
  --accent: #c8f060;
  --accent-dim: #8aaa30;
  --red: #ff5c5c;
  --red-dim: #3a1a1a;
  --green: #52d88a;
  --green-dim: #0e2a1a;
  --blue: #60a8f0;
  --blue-dim: #0e1e3a;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
}

.app { width: 100%; max-width: 680px; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--muted);
}
.stat-val { color: var(--text); font-weight: 500; }

/* PROGRESS */
.progress-wrap { margin-bottom: 2rem; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}
.progress-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* CATEGORY BADGE */
.cat-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
  margin-bottom: 1rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* QUESTION CARD */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.75rem;
  margin-bottom: 1rem;
}
.question-num {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.question-text {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text);
}

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }

.option {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  text-align: left;
  width: 100%;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  line-height: 1.5;
}
.option:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--surface2);
  transform: translateX(3px);
}
.option:disabled { cursor: default; transform: none; }
.option.correct {
  border-color: var(--green);
  background: var(--green-dim);
}
.option.wrong {
  border-color: var(--red);
  background: var(--red-dim);
}
.option.missed {
  border-color: var(--green);
  background: var(--green-dim);
  opacity: 0.6;
}

.opt-letter {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  flex-shrink: 0;
  color: var(--muted);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.option.correct .opt-letter { background: var(--green); border-color: var(--green); color: #0e2a1a; }
.option.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
.option.missed .opt-letter { background: var(--green); border-color: var(--green); color: #0e2a1a; }

/* EXPLANATION */
.explanation {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 1rem;
  display: none;
}
.explanation strong { color: var(--text); }
.explanation.show { display: block; animation: fadeIn 0.2s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

/* NEXT BTN */
.next-btn {
  width: 100%;
  padding: 1rem;
  background: var(--accent);
  color: #0e0f11;
  border: none;
  border-radius: var(--radius);
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: none;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.3px;
}
.next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.next-btn:active { transform: translateY(0); }
.next-btn.show { display: block; animation: fadeIn 0.2s ease; }

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.filter-btn {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0f11; font-weight: 500; }

/* RESULT SCREEN */
.result-screen {
  text-align: center;
  padding: 3rem 1rem;
  display: none;
}
.result-screen.show { display: block; animation: fadeIn 0.4s ease; }
.result-score {
  font-family: 'Syne', sans-serif;
  font-size: 72px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
}
.result-label {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 2rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.result-grade {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 2.5rem;
}
.result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-secondary {
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: #0e0f11;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.9; }

/* QUIZ AREA */
#quiz-area { display: block; }

/* STREAK */
.streak-badge {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 1rem;
  animation: fadeIn 0.3s ease;
}
.streak-badge.show { display: flex; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">Sport<span>Abi</span></div>
    <div class="stats">
      <div>✓ <span class="stat-val" id="stat-correct">0</span></div>
      <div>✗ <span class="stat-val" id="stat-wrong">0</span></div>
      <div>🔥 <span class="stat-val" id="stat-streak">0</span></div>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('bio',this)">Sportbiologie</button>
    <button class="filter-btn" onclick="setFilter('bew',this)">Bewegung</button>
    <button class="filter-btn" onclick="setFilter('ges',this)">Gesellschaft</button>
    <button class="filter-btn" onclick="setFilter('wrong',this)">Falsche</button>
  </div>

  <div id="quiz-area">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Frage 1 von 60</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="streak-badge" id="streak-badge">🔥 <span id="streak-text">3er Serie!</span></div>

    <div class="cat-badge" id="cat-badge">Kategorie</div>

    <div class="question-card">
      <div class="question-num" id="q-num">FRAGE 01</div>
      <div class="question-text" id="q-text">Frage wird geladen...</div>
    </div>

    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Weiter →</button>
  </div>

  <div class="result-screen" id="result-screen">
    <div class="result-score" id="res-score">0%</div>
    <div class="result-label">Ergebnis</div>
    <div class="result-grade" id="res-grade"></div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="restartWrong()">Nur Falsche wiederholen</button>
      <button class="btn-primary" onclick="restartAll()">Nochmal von vorne</button>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  // SPORTBIOLOGIE & PHYSIOLOGIE
  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was versteht man unter Superkompensation?",
   opts:["Der Körper erholt sich genau auf das Ausgangsniveau nach einer Belastung","Nach einer Belastung und Erholung steigt die Leistungsfähigkeit über das Ausgangsniveau","Superkompensation beschreibt die maximale Erschöpfung des Körpers","Der Körper passt sich nur bei sehr hohen Intensitäten an"],
   a:1, exp:"Superkompensation: Nach Belastung sinkt die Leistungsfähigkeit, steigt dann in der Erholungsphase über das Ausgangsniveau — das ist die Grundlage für Trainingsfortschritt."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Welche Muskelfasertypen gibt es und was charakterisiert den Typ I (ST-Faser)?",
   opts:["Typ I = schnell zuckend, anaerob, ermüdet schnell","Typ I = langsam zuckend, aerob, hohe Ausdauer, ermüdet langsam","Typ I = mittlere Ermüdbarkeit, gemischter Stoffwechsel","Typ I = ausschließlich für Maximalkraftleistungen geeignet"],
   a:1, exp:"ST-Fasern (Slow-Twitch) = Typ I: langsam, hohe Ausdauerkapazität, viele Mitochondrien, aerober Stoffwechsel. Ideal für Langzeitausdauer."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Wie wird Energie beim alaktazid-anaeroben Weg bereitgestellt?",
   opts:["Durch Verbrennung von Fetten ohne Sauerstoff","Durch Spaltung von Kreatinphosphat (KP) — kein Laktat, kein Sauerstoff","Durch Glykolyse mit Laktatbildung","Durch oxidative Phosphorylierung im Mitochondrium"],
   a:1, exp:"Alaktazid-anaerob: KP-Spaltung liefert ATP sofort, ohne O₂ und ohne Laktat. Dauert nur ca. 6–10 Sekunden — typisch für Sprintstart oder Weitsprung."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Ab welcher Belastungsdauer dominiert die aerobe Energiebereitstellung?",
   opts:["Ab ca. 10 Sekunden","Ab ca. 30 Sekunden","Ab ca. 2–3 Minuten","Ab ca. 10 Minuten"],
   a:2, exp:"Nach ca. 2–3 Minuten Belastung liefert der aerobe Stoffwechsel den Hauptanteil der Energie. Darunter dominiert die anaerobe Glykolyse (laktazid)."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was ist eine muskuläre Dysbalance?",
   opts:["Eine genetisch bedingte Muskelschwäche","Ein Ungleichgewicht zwischen Agonist und Antagonist, das zu Fehlhaltungen führt","Eine übermäßige Muskelhypertrophie durch Doping","Eine Verletzung des Muskelbauchs"],
   a:1, exp:"Muskuläre Dysbalancen entstehen, wenn antagonistische Muskelgruppen unterschiedlich stark / dehnfähig sind. Folge: Fehlhaltungen, erhöhtes Verletzungsrisiko."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was beschreibt VO₂max?",
   opts:["Die maximale Herzfrequenz bei Belastung","Die maximale Sauerstoffaufnahme pro Minute — Maß für aerobe Ausdauerleistung","Den maximalen Blutdruck unter Belastung","Die maximale Atemfrequenz pro Minute"],
   a:1, exp:"VO₂max = maximale Sauerstoffaufnahme (ml/min/kg). Wichtigstes Maß für aerobe Ausdauerkapazität. Ausdauertraining erhöht die VO₂max signifikant."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Welche Kontraktionsform liegt vor, wenn der Muskel Kraft erzeugt, sich aber nicht verkürzt?",
   opts:["Konzentrische Kontraktion","Exzentrische Kontraktion","Isometrische Kontraktion","Isotonische Kontraktion"],
   a:2, exp:"Isometrisch = gleiche Länge. Muskel entwickelt Spannung ohne Längenänderung, z. B. Wand schieben, Gleichgewichtshalten. Kein Bewegungseffekt, aber hohe Kraftentwicklung."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was passiert im Herz durch langfristiges Ausdauertraining?",
   opts:["Das Herz verkleinert sich und arbeitet effizienter","Das Schlagvolumen steigt, die Ruheherzfrequenz sinkt — das sog. Sportherz entwickelt sich","Die Herzfrequenz steigt dauerhaft an","Das Herz wird steifer und pumpt mehr Blut pro Schlag"],
   a:1, exp:"Sportherz: exzentrische Hypertrophie (Kammer vergrößert), höheres Schlagvolumen, niedrigere Ruheherzfrequenz (manchmal unter 40/min bei Ausdauersportlern)."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was sind Trainingsprinzipien?",
   opts:["Wissenschaftlich begründete Grundsätze, die die Planung und Durchführung von Training leiten","Staatlich vorgeschriebene Trainingsregeln für den Schulsport","Persönliche Erfahrungswerte des Trainers","Empfehlungen der WHO für Bewegungszeit pro Woche"],
   a:0, exp:"Trainingsprinzipien (z.B. progressiver Belastungssteigerung, Wechsel von Belastung & Erholung, Spezialisierung) sind wissenschaftlich fundierte Leitlinien für die Trainingsplanung."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was versteht man unter Kraftausdauer?",
   opts:["Die Fähigkeit, einen maximalen Kraftstoß zu erzeugen","Die Fähigkeit, Kraft über einen längeren Zeitraum aufrechtzuerhalten","Die Fähigkeit, bei hoher Geschwindigkeit Kraft zu entwickeln","Die Fähigkeit, den Muskel vollständig zu dehnen"],
   a:1, exp:"Kraftausdauer = Fähigkeit, bei länger dauernder Belastung möglichst wenig Kraftverlust zu erleiden, z. B. Rudern, Kanu, Klettern."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was sind Belastungsnormativa im Training?",
   opts:["Grenzwerte für gefährliche Belastungen","Steuerungsgrößen des Trainings: Intensität, Umfang, Dichte, Dauer und Häufigkeit","Empfohlene Mindestbelastungen für Schüler","Die maximale Herzfrequenz bei verschiedenen Sportarten"],
   a:1, exp:"Belastungsnormativa = Steuerungsgrößen: Intensität (Stärke), Umfang (Menge), Dichte (Verhältnis Belastung/Erholung), Dauer (Zeit), Häufigkeit (Einheiten/Woche)."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was kennzeichnet FT-Fasern (Fast-Twitch, Typ II)?",
   opts:["Hohe Ausdauerkapazität, viele Mitochondrien, rot gefärbt","Schnell zuckend, hohe Kraft, anaerober Stoffwechsel, ermüden schnell","Mittlere Kontraktionsgeschwindigkeit, gemischt aerob/anaerob","Ausschließlich für Ausdauerbelastungen geeignet"],
   a:1, exp:"FT-Fasern = Typ II: schnell, kraftvoll, wenige Mitochondrien, anaerob dominant. Ermüden schnell. Typisch für Sprinter, Gewichtheber."},

  {cat:"bio", catLabel:"Sportbiologie",
   q:"Was versteht man unter dem Prinzip der progressiven Belastungssteigerung?",
   opts:["Training muss immer gleich intensiv bleiben","Der Trainingsreiz muss mit zunehmender Leistungsfähigkeit gesteigert werden","Man beginnt mit hohen Intensitäten und reduziert diese","Pausen werden mit der Zeit kürzer"],
   a:1, exp:"Progressive Belastungssteigerung: Weil der Körper sich anpasst, müssen Reize zunehmend gesteigert werden (mehr Gewicht, Volumen, Intensität), sonst kein weiterer Fortschritt."},

  // BEWEGUNGSWISSENSCHAFT
  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was beschreibt das Drei-Phasen-Modell nach Meinel?",
   opts:["Drei Trainingsphasen: Aufwärmen, Hauptteil, Abwärmen","Drei Lernphasen: Grobkoordination, Feinkoordination, Stabilisierung","Drei biomechanische Prinzipien der Kraftübertragung","Drei Analysemethoden: Video, Foto, Beobachtung"],
   a:1, exp:"Drei-Phasen-Modell: 1. Grobkoordination (grober Ablauf), 2. Feinkoordination (verfeinert, weniger Fehler), 3. Stabilisierung (automatisiert, stabil unter Druck)."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was ist der Unterschied zwischen zyklischen und azyklischen Bewegungen?",
   opts:["Zyklisch = schnell, azyklisch = langsam","Zyklisch = wiederholende gleichartige Phasen (Laufen), azyklisch = einmalige Bewegungsfolge (Weitsprung)","Zyklisch = mit Geräten, azyklisch = ohne Geräte","Zyklisch = Ausdauer, azyklisch = Kraft"],
   a:1, exp:"Zyklisch: Phasen wiederholen sich rhythmisch (Laufen, Schwimmen, Radfahren). Azyklisch: Bewegung läuft einmalig ab (Wurf, Sprung, Schlag)."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Welches biomechanische Prinzip besagt, dass die Endgeschwindigkeit durch optimale zeitliche Koordination der Teilbewegungen maximiert wird?",
   opts:["Prinzip der Anfangskraft","Prinzip der optimalen Beschleunigung","Prinzip der Koordination der Teilbewegungen","Prinzip der Gegenwirkung"],
   a:2, exp:"Koordinationsprinzip (nach Hochmuth): Teilbewegungen werden zeitlich so koordiniert, dass jede folgende beginnt, wenn die vorherige ihre Maximalgeschwindigkeit erreicht hat — z. B. Speerwurf."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was ist qualitative Bewegungsanalyse?",
   opts:["Analyse mit exakten Messdaten wie Kraft und Geschwindigkeit","Beurteilung der Bewegungsqualität nach Merkmalen wie Rhythmus, Fluss und Präzision ohne Messinstrumente","Analyse der Trainingseffekte über mehrere Wochen","Bewertung der sportlichen Leistung im Wettkampf"],
   a:1, exp:"Qualitative Analyse: Beurteilung der Bewegung nach Merkmalen wie Rhythmus, Fluss, Präzision, Körperspannung — ohne exakte Messtechnik, z. B. durch Beobachtungsbogen."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was sind Analysatoren im motorischen Lernprozess?",
   opts:["Computerprogramme zur Videoauswertung","Sensorische Systeme (visuell, vestibulär, kinästhetisch) die Informationen aufnehmen und verarbeiten","Trainingswissenschaftliche Bewertungskategorien","Modelle zur Beschreibung von Trainingszyklen"],
   a:1, exp:"Analysatoren = sensorische Systeme: visuell (Auge), vestibulär (Gleichgewicht), kinästhetisch (Muskel-/Gelenkgefühl), taktil (Tastsinn). Liefern Feedback für die Bewegungssteuerung."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was beschreibt das NEUMAIER-Modell?",
   opts:["Ein Modell der Herzfrequenzsteuerung im Ausdauertraining","Ein Modell zu Druckbedingungen in Sportspielen: Zeit-, Präzisions-, Komplexitäts-, Situations- und Belastungsdruck","Ein biomechanisches Modell der Kraftübertragung","Ein Modell zur Beschreibung motorischer Lernphasen"],
   a:1, exp:"NEUMAIER-Modell: In Sportspielen wirken 5 Druckbedingungen auf den Sportler: Zeitdruck, Präzisionsdruck, Komplexitätsdruck, Situationsdruck, Belastungsdruck."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was versteht man unter Motorik als Regelkreis?",
   opts:["Motorisches Lernen folgt festen Regeln ohne Rückmeldung","Bewegungssteuerung als geschlossenes System: Sollwert, Istwert, Vergleich und Korrektur durch Feedback","Motorische Fähigkeiten werden nur durch Wiederholung entwickelt","Ein Trainingsplan mit festgelegten Wiederholungszahlen"],
   a:1, exp:"Regelkreis: Sollwert (geplante Bewegung) wird mit Istwert (ausgeführte Bewegung) verglichen. Abweichungen werden durch Feedback korrigiert — Grundlage der Bewegungssteuerung."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"In welcher Lernphase ist eine Bewegung automatisiert und unter Druckbedingungen stabil?",
   opts:["Grobkoordination","Feinkoordination","Stabilisierung / Automatisierung","Variabilisierung"],
   a:2, exp:"In der Stabilisierungsphase (3. Phase) ist die Bewegung weitgehend automatisiert: Sie läuft unbewusst ab, ist stabil unter Wettkampfdruck und variabel anwendbar."},

  {cat:"bew", catLabel:"Bewegungswiss.",
   q:"Was ist der Unterschied zwischen translatorischer und rotatorischer Bewegung?",
   opts:["Translatorisch = im Wasser, rotatorisch = an Land","Translatorisch = geradlinige Ortsveränderung, rotatorisch = Drehbewegung um eine Achse","Translatorisch = schnell, rotatorisch = langsam","Translatorisch = Beine, rotatorisch = Arme"],
   a:1, exp:"Translatorisch: Körperschwerpunkt bewegt sich geradlinig (Laufen, Gleiten). Rotatorisch: Drehbewegung um eine Achse (Salto, Pirouette, Diskuswurf)."},

let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let streak = 0;
let wrongIds = new Set();
let answered = false;
let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restart();
}

function buildDeck() {
  let pool;
  if (activeFilter === 'wrong') {
    pool = [...wrongIds].map(i => ALL_QUESTIONS[i]);
    if (pool.length === 0) pool = [...ALL_QUESTIONS];
  } else if (activeFilter === 'all') {
    pool = [...ALL_QUESTIONS];
  } else {
    pool = ALL_QUESTIONS.filter(q => q.cat === activeFilter);
  }
  // shuffle
  questions = pool.map((q, i) => ({...q, origIdx: ALL_QUESTIONS.indexOf(q)}))
    .sort(() => Math.random() - 0.5);
}

function restart() {
  current = 0; correct = 0; wrong = 0; streak = 0;
  updateStats();
  buildDeck();
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('filter-bar').style.display = 'flex';
  loadQuestion();
}

function restartAll() {
  wrongIds.clear();
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  restart();
}

function restartWrong() {
  activeFilter = 'wrong';
  restart();
}

function updateStats() {
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-streak').textContent = streak;
}

function loadQuestion() {
  if (current >= questions.length) { showResult(); return; }
  answered = false;
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round((current / total) * 100);

  document.getElementById('prog-label').textContent = `Frage ${current+1} von ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('cat-badge').textContent = q.catLabel;
  document.getElementById('q-num').textContent = `FRAGE ${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.q;

  const letters = ['A','B','C','D'];
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, q.a, q);
    optDiv.appendChild(btn);
  });

  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('next-btn').classList.remove('show');

  const sb = document.getElementById('streak-badge');
  if (streak >= 3) {
    sb.classList.add('show');
    document.getElementById('streak-text').textContent = `${streak}er Serie! 🔥`;
  } else { sb.classList.remove('show'); }
}

function selectAnswer(chosen, correct_idx, q) {
  if (answered) return;
  answered = true;
  const opts = document.querySelectorAll('.option');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct_idx) btn.classList.add('correct');
    else if (i === chosen && chosen !== correct_idx) btn.classList.add('wrong');
  });

  if (chosen === correct_idx) {
    correct++; streak++;
    wrongIds.delete(q.origIdx);
  } else {
    wrong++; streak = 0;
    wrongIds.add(q.origIdx);
  }
  updateStats();

  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>${chosen === correct_idx ? '✓ Richtig!' : '✗ Falsch.'}</strong> ${q.exp}`;
  exp.classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  current++;
  loadQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('res-score').textContent = pct + '%';

  let grade, color;
  if (pct >= 95) { grade = '⭐ Note 1 — Exzellent!'; color = '#c8f060'; }
  else if (pct >= 80) { grade = '🟢 Note 2 — Sehr gut!'; color = '#52d88a'; }
  else if (pct >= 65) { grade = '🟡 Note 3 — Gut'; color = '#f0c060'; }
  else if (pct >= 50) { grade = '🟠 Note 4 — Ausreichend'; color = '#f0a060'; }
  else { grade = '🔴 Noch Lernbedarf — nicht aufgeben!'; color = '#ff5c5c'; }

  const gEl = document.getElementById('res-grade');
  gEl.textContent = grade;
  gEl.style.color = color;
  document.getElementById('result-screen').classList.add('show');
}

// Start
buildDeck();
loadQuestion();
</script>
</body>
</html>
